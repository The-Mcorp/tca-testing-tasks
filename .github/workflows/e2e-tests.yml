name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      # SQL Server for testing
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: TestPassword123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P TestPassword123! -Q 'SELECT 1'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          MyApp.Client/package-lock.json
          MyApp.ClientTests/package-lock.json
          MyApp.E2ETests/package-lock.json

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Install Frontend dependencies
      run: |
        cd MyApp.Client
        npm ci

    - name: Install Unit Test dependencies
      run: |
        cd MyApp.ClientTests
        npm ci

    - name: Install E2E Test dependencies
      run: |
        cd MyApp.E2ETests
        npm ci

    - name: Install Playwright Browsers
      run: |
        cd MyApp.E2ETests
        npx playwright install --with-deps

    - name: Build .NET Application
      run: dotnet build --no-restore

    - name: Run Unit Tests
      run: |
        cd MyApp.ClientTests
        npm run test:run

    - name: Start Application
      run: |
        dotnet run --project MyApp &
        sleep 30  # Wait for application to start
      env:
        ASPNETCORE_ENVIRONMENT: Testing
        ConnectionStrings__DefaultConnection: Server=localhost,1433;Database=TcaTestingTasksTest;User Id=sa;Password=TestPassword123!;TrustServerCertificate=true

    - name: Wait for Application
      run: |
        timeout 60 bash -c 'until curl -k https://localhost:5001/health; do sleep 1; done'

    - name: Run Playwright Tests
      run: |
        cd MyApp.E2ETests
        npx playwright test
      env:
        BASE_URL: https://localhost:5001

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: MyApp.E2ETests/playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: MyApp.E2ETests/test-results/
        retention-days: 30

  docker-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build Application
      run: |
        dotnet restore
        dotnet build
        cd MyApp.Client && npm ci

    - name: Start Application
      run: |
        dotnet run --project MyApp &
        sleep 30
      env:
        ASPNETCORE_ENVIRONMENT: Testing

    - name: Install E2E Test dependencies
      run: |
        cd MyApp.E2ETests
        npm ci

    - name: Run E2E Tests with Docker
      run: |
        cd MyApp.E2ETests
        npm run test:docker
      env:
        BASE_URL: https://localhost:5001

    - name: Upload Docker Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-test-results
        path: MyApp.E2ETests/test-results/
        retention-days: 30